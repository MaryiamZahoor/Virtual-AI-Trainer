services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtual_trainer_backend
    restart: unless-stopped
    environment:
      - DEBUG=False
      - API_TITLE=Virtual Trainer API
      - API_VERSION=1.0.0
    expose:
      - "8000"

  frontend:
    image: nginx:alpine
    container_name: virtual_trainer_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend