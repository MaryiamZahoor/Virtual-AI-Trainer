name: CI CD EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Import FastAPI app
        run: |
          python -c "from app.main import app; print(app.title)"

      - name: Run tests
        run: |
          python -m pytest

  deploy:
    name: Deploy To EC2
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key

      - name: Add EC2 host to known hosts
        run: |
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Check EC2 connection
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            echo "Connected to EC2"
            whoami
            pwd
          '

      - name: Deploy on EC2
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} '
            set -e

            echo "Moving to project folder"
            cd ~/virtualTrainer

            echo "Current branch and commit"
            git branch --show-current
            git rev-parse --short HEAD

            echo "Pulling latest code"
            git pull origin main

            echo "Checking Docker"
            docker --version
            docker ps

            echo "Checking Docker Compose"
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose version
              COMPOSE_CMD="docker-compose"
            elif docker compose version >/dev/null 2>&1; then
              docker compose version
              COMPOSE_CMD="docker compose"
            else
              echo "Docker Compose is not installed"
              exit 1
            fi

            echo "Starting production containers"
            $COMPOSE_CMD -f docker-compose.prod.yml up -d --build

            echo "Running containers"
            docker ps

            echo "Cleaning unused Docker images"
            docker image prune -f
          '